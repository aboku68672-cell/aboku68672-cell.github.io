<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>检测报告预览</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f5f5f5; }
        #controls { position: sticky; top: 0; background: white; padding: 10px;
                     box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px;
                     display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        #page-container { text-align: center; }
        canvas { max-width: 100%; height: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.15); margin-bottom: 10px; }
        .btn { background: #007aff; color: white; border: none; padding: 8px 18px;
               border-radius: 5px; font-size: 16px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn:active { opacity: 0.8; }
        #page-num { font-weight: bold; margin: 0 10px; }
    </style>
</head>
<body>
    <div id="controls">
        <div>
            <button class="btn" id="prev">上一页</button>
            <span>第 <span id="page-num">1</span> / <span id="page-count">1</span> 页</span>
            <button class="btn" id="next">下一页</button>
        </div>
        <a class="btn" id="download-btn" download>下载 PDF 原件</a>
    </div>
    <div id="page-container">
        <canvas id="pdf-canvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const urlParams = new URLSearchParams(window.location.search);
        const pdfFile = urlParams.get('file');
        if (!pdfFile) {
            document.body.innerHTML = '<h2 style="text-align:center;margin-top:50px;">请在链接中指定 ?file=文件名.pdf</h2>';
            throw new Error('缺少文件参数');
        }

        const pdfUrl = pdfFile;
        const downloadBtn = document.getElementById('download-btn');
        downloadBtn.href = pdfUrl;
        downloadBtn.download = pdfFile.split('/').pop();

        let pdfDoc = null,
            pageNum = 1,
            pageRendering = false,
            pageNumPending = null,
            canvas = document.getElementById('pdf-canvas'),
            ctx = canvas.getContext('2d');

        pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
            pdfDoc = pdf;
            document.getElementById('page-count').textContent = pdf.numPages;
            renderPage(pageNum);
        }).catch(function(error) {
            document.body.innerHTML = '<h2 style="text-align:center;margin-top:50px;">报告加载失败，请检查文件是否存在</h2>';
        });

        function renderPage(num) {
            pageRendering = true;
            pdfDoc.getPage(num).then(function(page) {
                const viewport = page.getViewport({ scale: 1.5 });
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                const renderTask = page.render(renderContext);
                renderTask.promise.then(function() {
                    pageRendering = false;
                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            });
            document.getElementById('page-num').textContent = num;
        }

        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        document.getElementById('prev').addEventListener('click', function() {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        });
        document.getElementById('next').addEventListener('click', function() {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        });
    </script>
</body>
</html>
